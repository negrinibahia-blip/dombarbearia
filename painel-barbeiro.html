<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Studio Dom Almeida — Painel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --dark:  #0D0D0D;
    --dark2: #161616;
    --dark3: #1F1F1F;
    --border:#2A2A2A;
    --text:  #F0EDE8;
    --muted: #888;
    --white: #FFFFFF;
    --green: #25D366;
    --red:   #e05252;
    --gold:  #FFFFFF;
  }
  body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  /* LOGIN */
  .login-screen {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 2rem;
  }
  .login-box {
    background: var(--dark2);
    border: 1px solid var(--border);
    padding: 3rem 2.5rem;
    width: 100%; max-width: 380px;
    text-align: center;
  }
  .login-logo { font-size: 2.5rem; margin-bottom: 1rem; }
  .login-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 0.3rem; }
  .login-sub { font-size: 0.8rem; color: var(--muted); margin-bottom: 2rem; letter-spacing: 0.1em; }
  .login-input {
    width: 100%; background: var(--dark); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 1rem;
    padding: 0.8rem 1rem; outline: none; margin-bottom: 1rem;
    transition: border-color 0.2s;
  }
  .login-input:focus { border-color: var(--white); }
  .login-btn {
    width: 100%; background: var(--white); color: var(--dark);
    font-family: 'DM Sans', sans-serif; font-weight: 700;
    font-size: 0.9rem; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 0.9rem; border: none; cursor: pointer;
    transition: opacity 0.2s;
  }
  .login-btn:hover { opacity: 0.85; }
  .login-err { color: var(--red); font-size: 0.8rem; margin-top: 0.75rem; display: none; }

  /* PAINEL */
  .painel { display: none; }

  /* HEADER */
  .painel-header {
    background: var(--dark2);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .painel-logo { display: flex; align-items: center; gap: 0.75rem; }
  .painel-logo-icon { font-size: 1.3rem; }
  .painel-logo-name { font-family: 'Playfair Display', serif; font-size: 1rem; }
  .painel-logo-sub { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; }
  .logout-btn {
    background: none; border: 1px solid var(--border);
    color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem; padding: 0.4rem 0.8rem; cursor: pointer;
    transition: all 0.2s;
  }
  .logout-btn:hover { border-color: var(--red); color: var(--red); }

  /* STATS */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1px; background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .stat-item {
    background: var(--dark2);
    padding: 1.2rem 1.5rem;
    text-align: center;
  }
  .stat-val { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--white); }
  .stat-label { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 0.2rem; }

  /* FILTROS */
  .filtros {
    padding: 1.2rem 1.5rem;
    display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .filtros input[type="date"], .filtros select {
    background: var(--dark2); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem; padding: 0.5rem 0.75rem; outline: none;
    transition: border-color 0.2s;
  }
  .filtros input:focus, .filtros select:focus { border-color: var(--white); }
  .filtros-label { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

  /* LISTA */
  .lista-wrap { padding: 1.5rem; }
  .lista-header {
    display: grid;
    grid-template-columns: 1fr 1fr 1.5fr 80px 100px;
    gap: 0.5rem;
    padding: 0.5rem 1rem;
    font-size: 0.65rem; color: var(--muted);
    letter-spacing: 0.15em; text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.5rem;
  }
  .agendamento-card {
    display: grid;
    grid-template-columns: 1fr 1fr 1.5fr 80px 100px;
    gap: 0.5rem;
    align-items: center;
    background: var(--dark2);
    border: 1px solid var(--border);
    padding: 0.8rem 1rem;
    margin-bottom: 0.4rem;
    transition: border-color 0.15s;
  }
  .agendamento-card:hover { border-color: #444; }
  .agendamento-card.cancelado { opacity: 0.45; }

  .ag-nome { font-size: 0.88rem; font-weight: 500; }
  .ag-info { font-size: 0.78rem; color: var(--muted); }
  .ag-servico { font-size: 0.82rem; }
  .ag-horario { font-size: 0.82rem; font-weight: 600; color: var(--white); }

  .status-badge {
    font-size: 0.62rem; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 0.25rem 0.5rem;
    text-align: center;
  }
  .status-confirmado { background: rgba(37,211,102,0.1); color: var(--green); border: 1px solid rgba(37,211,102,0.25); }
  .status-cancelado  { background: rgba(224,82,82,0.1);  color: var(--red);   border: 1px solid rgba(224,82,82,0.25); }

  .ag-actions { display: flex; gap: 0.3rem; }
  .ag-btn {
    background: none; border: 1px solid var(--border);
    color: var(--muted); font-size: 0.72rem; padding: 0.3rem 0.5rem;
    cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif;
  }
  .ag-btn:hover { border-color: var(--red); color: var(--red); }
  .ag-btn.wpp:hover { border-color: var(--green); color: var(--green); }

  .empty-state {
    text-align: center; padding: 3rem; color: var(--muted);
    font-size: 0.9rem;
  }
  .empty-state div { font-size: 2rem; margin-bottom: 0.75rem; }

  .loading { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.85rem; }

  @media (max-width: 600px) {
    .lista-header { display: none; }
    .agendamento-card {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto auto;
    }
    .ag-actions { grid-column: 1 / -1; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">✂️</div>
    <div class="login-title">Studio Dom Almeida</div>
    <div class="login-sub">Painel do Barbeiro</div>
    <input class="login-input" type="password" id="senhaInput" placeholder="Senha de acesso" onkeydown="if(event.key==='Enter') entrar()"/>
    <button class="login-btn" onclick="entrar()">Entrar</button>
    <div class="login-err" id="loginErr">Senha incorreta!</div>
  </div>
</div>

<!-- PAINEL -->
<div class="painel" id="painel">

  <div class="painel-header">
    <div class="painel-logo">
      <div class="painel-logo-icon">✂️</div>
      <div>
        <div class="painel-logo-name">Studio Dom Almeida</div>
        <div class="painel-logo-sub">Painel de Agendamentos</div>
      </div>
    </div>
    <button class="logout-btn" onclick="sair()">Sair</button>
  </div>

  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-val" id="statHoje">—</div>
      <div class="stat-label">Hoje</div>
    </div>
    <div class="stat-item">
      <div class="stat-val" id="statSemana">—</div>
      <div class="stat-label">Esta semana</div>
    </div>
    <div class="stat-item">
      <div class="stat-val" id="statTotal">—</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-item">
      <div class="stat-val" id="statCancelados">—</div>
      <div class="stat-label">Cancelados</div>
    </div>
  </div>

  <div class="filtros">
    <span class="filtros-label">Filtrar por data:</span>
    <input type="date" id="filtroData" onchange="carregarAgendamentos()"/>
    <span class="filtros-label">Status:</span>
    <select id="filtroStatus" onchange="carregarAgendamentos()">
      <option value="">Todos</option>
      <option value="confirmado">Confirmados</option>
      <option value="cancelado">Cancelados</option>
    </select>
    <button class="ag-btn" onclick="limparFiltros()" style="margin-left:auto">Limpar filtros</button>
    <button class="ag-btn wpp" onclick="carregarAgendamentos()">↻ Atualizar</button>
  </div>

  <div class="lista-wrap">
    <div class="lista-header">
      <span>Cliente</span>
      <span>Data / Horário</span>
      <span>Serviço</span>
      <span>Status</span>
      <span>Ações</span>
    </div>
    <div id="listaAgendamentos">
      <div class="loading">Carregando...</div>
    </div>
  </div>

</div>

<script>
  // ── CONFIG ────────────────────────────────────────
  const SENHA        = "dom2024";          // ⚠️ Troque esta senha!
  const NUMERO_BARB  = "5571992556234";
  const SUPABASE_URL = "https://eackgucfbrryvmostnjd.supabase.co";
  const SUPABASE_KEY = "sb_publishable_cb8-vR2uH5ah7cUR2nd6cg_eaxk_fPr";
  // ─────────────────────────────────────────────────

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  // LOGIN
  function entrar() {
    const v = document.getElementById('senhaInput').value;
    if (v === SENHA) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('painel').style.display = 'block';
      carregarTudo();
    } else {
      document.getElementById('loginErr').style.display = 'block';
    }
  }

  function sair() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('painel').style.display = 'none';
    document.getElementById('senhaInput').value = '';
  }

  // CARREGAR STATS
  async function carregarStats() {
    const hoje = new Date().toISOString().split('T')[0];
    const inicioSemana = new Date();
    inicioSemana.setDate(inicioSemana.getDate() - inicioSemana.getDay());
    const semana = inicioSemana.toISOString().split('T')[0];

    const { data: todos }      = await db.from('agendamentos').select('*');
    const { data: hj }         = await db.from('agendamentos').select('*').eq('data', hoje).eq('status','confirmado');
    const { data: sw }         = await db.from('agendamentos').select('*').gte('data', semana).eq('status','confirmado');
    const { data: cancelados } = await db.from('agendamentos').select('*').eq('status','cancelado');

    document.getElementById('statHoje').textContent      = hj?.length ?? 0;
    document.getElementById('statSemana').textContent    = sw?.length ?? 0;
    document.getElementById('statTotal').textContent     = todos?.filter(t => t.status === 'confirmado').length ?? 0;
    document.getElementById('statCancelados').textContent = cancelados?.length ?? 0;
  }

  // CARREGAR AGENDAMENTOS
  async function carregarAgendamentos() {
    const lista   = document.getElementById('listaAgendamentos');
    const data    = document.getElementById('filtroData').value;
    const status  = document.getElementById('filtroStatus').value;

    lista.innerHTML = '<div class="loading">Carregando...</div>';

    let query = db.from('agendamentos').select('*').order('data', { ascending: true }).order('horario', { ascending: true });
    if (data)   query = query.eq('data', data);
    if (status) query = query.eq('status', status);

    const { data: rows, error } = await query;

    if (error || !rows || rows.length === 0) {
      lista.innerHTML = '<div class="empty-state"><div>📅</div>Nenhum agendamento encontrado.</div>';
      return;
    }

    lista.innerHTML = rows.map(ag => {
      const [ano, mes, dia] = ag.data.split('-');
      const dataFmt = `${dia}/${mes}/${ano}`;
      return `
        <div class="agendamento-card ${ag.status === 'cancelado' ? 'cancelado' : ''}">
          <div>
            <div class="ag-nome">${ag.nome}</div>
            <div class="ag-info">${ag.telefone}</div>
          </div>
          <div>
            <div class="ag-horario">${ag.horario}</div>
            <div class="ag-info">${dataFmt}</div>
          </div>
          <div class="ag-servico">${ag.servico}</div>
          <div>
            <span class="status-badge status-${ag.status}">${ag.status}</span>
          </div>
          <div class="ag-actions">
            <button class="ag-btn wpp" title="WhatsApp" onclick="chamarWhatsApp('${ag.telefone}','${ag.nome}','${ag.horario}','${dataFmt}')">💬</button>
            ${ag.status === 'confirmado'
              ? `<button class="ag-btn" title="Cancelar" onclick="cancelar('${ag.id}')">✕</button>`
              : `<button class="ag-btn" title="Restaurar" onclick="restaurar('${ag.id}')">↺</button>`
            }
          </div>
        </div>`;
    }).join('');
  }

  async function cancelar(id) {
    if (!confirm('Cancelar este agendamento?')) return;
    await db.from('agendamentos').update({ status: 'cancelado' }).eq('id', id);
    carregarTudo();
  }

  async function restaurar(id) {
    await db.from('agendamentos').update({ status: 'confirmado' }).eq('id', id);
    carregarTudo();
  }

  function chamarWhatsApp(tel, nome, horario, data) {
    const num = tel.replace(/\D/g,'');
    const msg = `Olá ${nome}! Passando para confirmar seu agendamento na Studio Dom Almeida.\n\n🕐 Horário: ${horario}\n📅 Data: ${data}\n\nAguardamos você! ✂️`;
    const url = `https://wa.me/55${num}?text=${encodeURIComponent(msg)}`;
    const a = document.createElement('a'); a.href = url; a.target = '_blank'; document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }

  function limparFiltros() {
    document.getElementById('filtroData').value = '';
    document.getElementById('filtroStatus').value = '';
    carregarAgendamentos();
  }

  function carregarTudo() {
    carregarStats();
    carregarAgendamentos();
  }
</script>
</body>
</html>
